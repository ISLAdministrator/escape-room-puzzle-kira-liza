<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Escape Room</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="room-bg"> 
  
  <img src="start_button.png" id="start-button" alt="Start Game">

  <div id="game-container"></div>

  <script src="script.js"></script>

  <body id="room-bg">
    <div id="game-overlay">
        
        <div class="hotspot" id="dot-left"></div>
        <div class="hotspot" id="dot-desk"></div>
        <div class="hotspot" id="dot-chair"></div>
        <div class="hotspot" id="dot-right"></div>

        <div id="message-box" class="hidden">
            <p id="message-text"></p>
            <button id="continue-btn" class="hidden">CONTINUE</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
